<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c10">
<title>Focus Store · Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  :root {
    --bg: #0a0c10; --bg2: #111318; --bg3: #181c24;
    --border: #2a3145; --accent: #3d6aff; --accent2: #6a3dff;
    --green: #2ed573; --red: #ff4757; --gold: #f5c842;
    --text: #e8ecf5; --text2: #8892aa; --text3: #5a6480;
    --teal: #00c8a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

  /* ── SCREENS ── */
  .screen { display: none; height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── PIN SCREEN ── */
  #pinScreen {
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 30% 50%, rgba(61,106,255,.15) 0%, transparent 60%), var(--bg);
  }
  .pin-box { width: 100%; max-width: 340px; padding: 0 24px; }
  .pin-logo { text-align: center; margin-bottom: 32px; }
  .pin-logo .logo-icon {
    width: 72px; height: 72px; background: linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 16px;
    box-shadow: 0 0 30px rgba(61,106,255,.4);
  }
  .pin-logo h1 { font-size: 22px; font-weight: 800; }
  .pin-logo p { color: var(--text2); font-size: 13px; margin-top: 4px; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin: 28px 0 24px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); transition: all .2s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.2); }
  .pin-dot.error { background: var(--red); border-color: var(--red); }
  .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .pin-btn {
    height: 64px; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
    color: var(--text); font-size: 22px; font-weight: 700; cursor: pointer;
    transition: all .15s; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .pin-btn:active { background: var(--accent); border-color: var(--accent); transform: scale(.95); }
  .pin-btn.del { font-size: 18px; color: var(--text2); }
  .pin-btn.empty { visibility: hidden; }
  .pin-err { text-align: center; color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }

  /* ── MAIN APP ── */
  #appScreen { background: var(--bg); }

  /* ── HEADER ── */
  .app-header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .app-header-brand { display: flex; align-items: center; gap: 10px; }
  .app-header-brand .icon { width: 34px; height: 34px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .app-header-brand h1 { font-size: 15px; font-weight: 700; }
  .app-header-brand p { font-size: 11px; color: var(--text2); }
  .btn-lock { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); padding: 7px 12px; font-size: 12px; cursor: pointer; }

  /* ── TABS ── */
  .app-tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .app-tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .app-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── CONTENT ── */
  .app-content { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .tab-pane { display: none; padding: 16px; }
  .tab-pane.active { display: block; }

  /* ── SCANNER ── */
  .scanner-wrap {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; position: relative; margin-bottom: 16px;
  }
  #scannerView { width: 100%; height: 260px; position: relative; background: #000; }
  #scannerView video { width: 100%; height: 100%; object-fit: cover; }
  #scannerView canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .scan-overlay {
    position: absolute; inset: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .scan-frame {
    width: 220px; height: 120px; position: relative;
  }
  .scan-frame::before, .scan-frame::after,
  .scan-frame span::before, .scan-frame span::after {
    content: ''; position: absolute; width: 24px; height: 24px; border-color: var(--accent); border-style: solid;
  }
  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .scan-frame span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .scan-frame span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .scan-line {
    position: absolute; left: 10px; right: 10px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanLine 2s ease-in-out infinite;
  }
  @keyframes scanLine { 0%,100%{top:10px;opacity:0} 10%{opacity:1} 50%{top:calc(100% - 10px)} 90%{opacity:1} }

  .scan-status { padding: 12px 16px; font-size: 13px; color: var(--text2); text-align: center; }

  .btn-scan {
    width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-scan.start { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; }
  .btn-scan.stop  { background: rgba(255,71,87,.15); border: 1px solid var(--red); color: var(--red); }
  .btn-scan:active { transform: scale(.97); }

  /* ── MANUAL SEARCH ── */
  .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-row input {
    flex: 1; padding: 13px 16px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px; outline: none;
    transition: border .2s;
  }
  .search-row input:focus { border-color: var(--accent); }
  .search-row button {
    padding: 13px 20px; background: var(--accent); border: none; border-radius: 12px;
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .search-row button:active { transform: scale(.95); }

  /* ── RESULT CARD ── */
  .result-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .result-header {
    padding: 16px; border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(61,106,255,.08), transparent);
  }
  .result-sku { font-size: 11px; color: var(--text3); font-family: monospace; margin-bottom: 4px; }
  .result-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .result-badges { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .rbadge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .rbadge-nuevo { background: rgba(0,200,160,.15); color: var(--teal); }
  .rbadge-usado { background: rgba(255,107,53,.15); color: #ff6b35; }
  .rbadge-openbox { background: rgba(245,200,66,.15); color: var(--gold); }

  .result-prices { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .price-item { background: var(--bg3); border-radius: 10px; padding: 12px; }
  .price-label { font-size: 10px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .price-value { font-size: 20px; font-weight: 800; }
  .price-green { color: var(--green); }
  .price-teal  { color: var(--teal); }
  .price-gold  { color: var(--gold); }
  .price-blue  { color: var(--accent); }

  .result-stock { padding: 0 16px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stock-item { background: var(--bg3); border-radius: 10px; padding: 12px; }

  .result-not-found {
    background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.2);
    border-radius: 16px; padding: 32px 16px; text-align: center;
    animation: fadeIn .3s ease;
  }
  .result-not-found .icon { font-size: 40px; margin-bottom: 12px; }
  .result-not-found h3 { color: var(--red); font-size: 16px; margin-bottom: 6px; }
  .result-not-found p { color: var(--text2); font-size: 13px; }

  /* ── HISTORY TAB ── */
  .hist-list { display: flex; flex-direction: column; gap: 10px; }
  .hist-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer; transition: background .15s;
  }
  .hist-card:active { background: var(--bg3); }
  .hist-card-sku { font-size: 11px; color: var(--text3); font-family: monospace; }
  .hist-card-name { font-size: 14px; font-weight: 600; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-card-price { font-size: 16px; font-weight: 800; color: var(--green); }
  .hist-card-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .empty-hist { text-align: center; padding: 48px 16px; color: var(--text3); }
  .empty-hist .icon { font-size: 40px; margin-bottom: 12px; }

  /* ── LOADING ── */
  .loading-wrap { text-align: center; padding: 40px 16px; color: var(--text2); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; width: 90%; max-width: 340px; }
  .toast-msg { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-top: 8px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
  .toast-success { border-color: rgba(46,213,115,.4); color: var(--green); }
  .toast-error   { border-color: rgba(255,71,87,.4);  color: var(--red); }
  .toast-info    { border-color: rgba(61,106,255,.4);  color: var(--accent); }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pinScreen" class="screen active">
  <div class="pin-box">
    <div class="pin-logo">
      <div class="logo-icon">📊</div>
      <h1>Focus Store</h1>
      <p>Consulta de Precios</p>
    </div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn empty"></button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" class="screen">
  <div class="app-header">
    <div class="app-header-brand">
      <div class="icon">📊</div>
      <div>
        <h1>Focus Store</h1>
        <p>Consulta de Precios</p>
      </div>
    </div>
    <button class="btn-lock" onclick="lockApp()">🔒 Salir</button>
  </div>

  <div class="app-tabs">
    <div class="app-tab active" onclick="switchTab('scanner')">📷 Escanear</div>
    <div class="app-tab" onclick="switchTab('manual')">🔍 Buscar</div>
    <div class="app-tab" onclick="switchTab('historial')">🕓 Historial</div>
  </div>

  <div class="app-content">

    <!-- SCANNER TAB -->
    <div class="tab-pane active" id="tab-scanner">
      <div class="scanner-wrap">
        <div id="scannerView">
          <div class="scan-overlay">
            <div class="scan-frame">
              <span></span>
              <div class="scan-line"></div>
            </div>
          </div>
        </div>
        <div class="scan-status" id="scanStatus">Presiona el botón para activar la cámara</div>
      </div>
      <button class="btn-scan start" id="btnScan" onclick="toggleScanner()">
        📷 Activar Cámara
      </button>
      <div style="margin-top:16px" id="scanResult"></div>
    </div>

    <!-- MANUAL TAB -->
    <div class="tab-pane" id="tab-manual">
      <div class="search-row">
        <input type="text" id="manualSku" placeholder="Escribe el SKU..." autocomplete="off"
          onkeydown="if(event.key==='Enter') buscarManual()">
        <button onclick="buscarManual()">🔍</button>
      </div>
      <div id="manualResult"></div>
    </div>

    <!-- HISTORIAL TAB -->
    <div class="tab-pane" id="tab-historial">
      <div class="hist-list" id="histList"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ===== CONFIG =====
const GS_URL = 'https://script.google.com/macros/s/AKfycbxwMiizG7po3Gy3EnpIAAncNMx3puGrIe3PZWByWCG6l_mcyIbbKrQauKG6oDZrnvWT/exec';
const PIN_CORRECTO = '1234'; // ← Cambia este PIN
let productos = [];
let historial = [];
let scannerActivo = false;
let pinActual = '';

// ===== PIN =====
function pinPress(n) {
  if(pinActual.length >= 4) return;
  pinActual += n;
  actualizarDots();
  if(pinActual.length === 4) {
    setTimeout(() => validarPin(), 200);
  }
}
function pinDel() {
  pinActual = pinActual.slice(0,-1);
  actualizarDots();
  document.getElementById('pinErr').textContent = '';
}
function actualizarDots() {
  for(let i=0;i<4;i++) {
    const d = document.getElementById('d'+i);
    d.className = 'pin-dot' + (i < pinActual.length ? ' filled' : '');
  }
}
function validarPin() {
  if(pinActual === PIN_CORRECTO) {
    document.getElementById('pinScreen').classList.remove('active');
    document.getElementById('appScreen').classList.add('active');
    cargarProductos();
  } else {
    for(let i=0;i<4;i++) document.getElementById('d'+i).className='pin-dot error';
    document.getElementById('pinErr').textContent = 'PIN incorrecto, intenta de nuevo';
    setTimeout(()=>{
      pinActual='';
      actualizarDots();
      document.getElementById('pinErr').textContent='';
    }, 1000);
  }
}
function lockApp() {
  pinActual='';
  actualizarDots();
  detenerScanner();
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('pinScreen').classList.add('active');
}

// ===== CARGAR DATOS =====
function cargarProductos() {
  return new Promise((resolve) => {
    const cbName = '_gs_cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      delete window[cbName]; script.remove();
      showToast('Sin conexión a Sheets', 'error');
      resolve([]);
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timeout); delete window[cbName]; script.remove();
      if(data.Productos) {
        productos = data.Productos.map(r => ({
          id: r.id||'', sku: String(r.sku||''), cantidad: parseInt(r.cantidad)||0,
          producto: r.producto||'', categoria: r.categoria||'', estado: r.estado||'Nuevo',
          costoUSD: parseFloat(r.costoUSD)||0, costoExtra: parseFloat(r.costoExtra)||0,
          fleteL: parseFloat(r.fleteL)||0, nivel: r.nivel||'Normal',
          overrideBanda: r.overrideBanda||'', ajusteManual: parseFloat(r.ajusteManual)||0,
          descuento: parseFloat(r.descuento)||0,
        }));
        showToast(`✅ ${productos.length} productos cargados`, 'info');
      }
      resolve(productos);
    };
    script.src = GS_URL + '?action=getAll&callback=' + cbName;
    script.onerror = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); resolve([]); };
    document.head.appendChild(script);
  });
}

// ===== CÁLCULOS (misma lógica que Precio Inteligente) =====
const PARAMETROS = {
  tipoCambio: 27, isvNuevo: 0.15, isvUsado: 0,
  bandas: [
    {banda:'Bajo',    excelente:.60,normal:.56,alto:.52,desde:0,      hasta:30},
    {banda:'Medio',   excelente:.46,normal:.42,alto:.38,desde:30.01,  hasta:400},
    {banda:'Alto',    excelente:.34,normal:.30,alto:.26,desde:400.01, hasta:1000},
    {banda:'Premium', excelente:.22,normal:.18,alto:.14,desde:1001,   hasta:999999}
  ],
  descMax: [
    {banda:'Bajo',    excelente:.12,normal:.11,alto:.10},
    {banda:'Medio',   excelente:.09,normal:.08,alto:.07},
    {banda:'Alto',    excelente:.06,normal:.05,alto:.04},
    {banda:'Premium', excelente:.03,normal:.02,alto:.01}
  ]
};

function calcProd(p) {
  const tc = PARAMETROS.tipoCambio;
  const costoTotalUSD = (parseFloat(p.costoUSD)||0) + (parseFloat(p.costoExtra)||0) + ((parseFloat(p.fleteL)||0)/tc);
  const costoTotalLPS = costoTotalUSD * tc;
  const isv = p.estado==='Nuevo' ? PARAMETROS.isvNuevo : PARAMETROS.isvUsado;

  let bandaAuto = 'Bajo';
  for(const b of PARAMETROS.bandas) { if(costoTotalUSD>=b.desde && costoTotalUSD<=b.hasta){bandaAuto=b.banda;break;} }
  const bandaEfectiva = (p.overrideBanda||'').trim() || bandaAuto;
  const nivelKey = (p.nivel||'Normal').toLowerCase();
  const bandaRow = PARAMETROS.bandas.find(b=>b.banda===bandaEfectiva)||PARAMETROS.bandas[0];
  const margenBase = bandaRow[nivelKey]||bandaRow.normal||0.40;
  const margenFinal = margenBase + (parseFloat(p.ajusteManual)||0);
  const precioNeto = costoTotalLPS * (1 + margenFinal);
  const precioConISV = p.estado==='Nuevo' ? precioNeto*(1+isv) : precioNeto;
  const descIngresadoPct = parseFloat(p.descuento||0)/100;
  const precioFinalDesc = precioConISV * (1 - descIngresadoPct);

  return { precioConISV, precioFinalDesc, descIngresadoPct: descIngresadoPct*100, bandaEfectiva };
}

function fmtLPS(v) { return 'L ' + parseFloat(v||0).toLocaleString('es-HN',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ===== BUSCAR PRODUCTO =====
function buscarPorSKU(sku) {
  const skuClean = String(sku||'').trim();
  return productos.find(p => String(p.sku).trim() === skuClean);
}

function renderResultado(p, contenedor) {
  if(!p) {
    contenedor.innerHTML = `
      <div class="result-not-found">
        <div class="icon">🔍</div>
        <h3>Producto no encontrado</h3>
        <p>No existe ningún producto con ese SKU en el sistema</p>
      </div>`;
    return;
  }
  const c = calcProd(p);
  const estadoClass = p.estado==='Nuevo'?'nuevo':p.estado==='Usado'?'usado':'openbox';
  const stockColor = p.cantidad===0?'color:var(--red)':p.cantidad<=3?'color:var(--gold)':'color:var(--green)';

  contenedor.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-sku">SKU: ${p.sku}</div>
        <div class="result-name">${p.producto}</div>
        <div class="result-badges">
          <span class="rbadge rbadge-${estadoClass}">${p.estado}</span>
          ${p.categoria ? `<span class="rbadge" style="background:rgba(61,106,255,.1);color:var(--accent)">${p.categoria}</span>` : ''}
          <span class="rbadge" style="background:rgba(255,255,255,.05);color:var(--text2)">${c.bandaEfectiva}</span>
        </div>
      </div>
      <div class="result-prices">
        <div class="price-item">
          <div class="price-label">Precio c/ISV</div>
          <div class="price-value price-green">${fmtLPS(c.precioConISV)}</div>
        </div>
        <div class="price-item">
          <div class="price-label">Precio Final c/Desc</div>
          <div class="price-value price-teal">${fmtLPS(c.precioFinalDesc)}</div>
        </div>
      </div>
      <div class="result-stock">
        <div class="stock-item">
          <div class="price-label">Descuento</div>
          <div class="price-value price-gold">${c.descIngresadoPct > 0 ? c.descIngresadoPct.toFixed(1)+'%' : '—'}</div>
        </div>
        <div class="stock-item">
          <div class="price-label">Stock</div>
          <div class="price-value" style="${stockColor}">${p.cantidad} uds</div>
        </div>
      </div>
    </div>`;

  // Agregar al historial
  agregarHistorial(p, c);
}

// ===== HISTORIAL =====
function agregarHistorial(p, c) {
  const entry = { sku: p.sku, nombre: p.producto, precio: c.precioConISV, time: new Date().toLocaleTimeString('es-HN',{hour:'2-digit',minute:'2-digit'}), p };
  historial = [entry, ...historial.filter(h=>h.sku!==p.sku)].slice(0,20);
  renderHistorial();
}
function renderHistorial() {
  const el = document.getElementById('histList');
  if(!historial.length) { el.innerHTML=`<div class="empty-hist"><div class="icon">🕓</div><p>Sin búsquedas recientes</p></div>`; return; }
  el.innerHTML = historial.map(h=>`
    <div class="hist-card" onclick="verDesdeHistorial('${h.sku}')">
      <div class="hist-card-sku">${h.sku}</div>
      <div class="hist-card-name">${h.nombre}</div>
      <div class="hist-card-price">${fmtLPS(h.precio)}</div>
      <div class="hist-card-time">Consultado a las ${h.time}</div>
    </div>`).join('');
}
function verDesdeHistorial(sku) {
  switchTab('manual');
  document.getElementById('manualSku').value = sku;
  buscarManual();
}

// ===== BÚSQUEDA MANUAL =====
function buscarManual() {
  const sku = document.getElementById('manualSku').value.trim();
  if(!sku) return;
  const p = buscarPorSKU(sku);
  renderResultado(p, document.getElementById('manualResult'));
}

// ===== SCANNER =====
function toggleScanner() {
  if(scannerActivo) detenerScanner();
  else iniciarScanner();
}

function iniciarScanner() {
  const btn = document.getElementById('btnScan');
  const status = document.getElementById('scanStatus');
  status.textContent = 'Iniciando cámara...';

  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.getElementById('scannerView'),
      constraints: { facingMode: 'environment', width: { min: 640 }, height: { min: 480 } }
    },
    decoder: { readers: ['code_128_reader','ean_reader','ean_8_reader','code_39_reader','upc_reader','upc_e_reader'] },
    locate: true
  }, err => {
    if(err) {
      status.textContent = '❌ No se pudo acceder a la cámara';
      showToast('Permite el acceso a la cámara', 'error');
      return;
    }
    Quagga.start();
    scannerActivo = true;
    btn.className = 'btn-scan stop';
    btn.innerHTML = '⏹️ Detener Cámara';
    status.textContent = '📷 Apunta al código de barras...';
  });

  Quagga.onDetected(resultado => {
    const sku = resultado.codeResult.code;
    if(!sku) return;
    detenerScanner();
    status.textContent = `✅ Escaneado: ${sku}`;
    document.getElementById('scanResult').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><p>Buscando producto...</p></div>';
    setTimeout(() => {
      const p = buscarPorSKU(sku);
      renderResultado(p, document.getElementById('scanResult'));
      if(p) showToast(`✅ ${p.producto.substring(0,30)}...`, 'info');
    }, 300);
  });
}

function detenerScanner() {
  if(!scannerActivo) return;
  Quagga.stop();
  scannerActivo = false;
  const btn = document.getElementById('btnScan');
  btn.className = 'btn-scan start';
  btn.innerHTML = '📷 Activar Cámara';
  document.getElementById('scanStatus').textContent = 'Presiona el botón para activar la cámara';
}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.app-tab').forEach((t,i)=>{
    const names=['scanner','manual','historial'];
    t.classList.toggle('active', names[i]===name);
  });
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name!=='scanner') detenerScanner();
  if(name==='historial') renderHistorial();
}

// ===== TOAST =====
function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast-msg toast-${type}`;
  t.textContent = msg;
  document.getElementById('toast').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  renderHistorial();
});
</script>
</body>
</html>
