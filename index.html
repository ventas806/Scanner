<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus Scanner">
<meta name="theme-color" content="#0a0c10">
<title>Focus Store · Scanner</title>
<link rel="manifest" href="#" id="manifestLink">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--bg4:#1e2330;
  --border:#2a3145;--border2:#354060;
  --accent:#3d6aff;--accent2:#6a3dff;--accent3:#00c8a0;--accent4:#ff6b35;
  --gold:#f5c842;--red:#ff4757;--green:#2ed573;
  --text:#e8ecf5;--text2:#8892aa;--text3:#5a6480;
  --card:#141720;--card2:#1a1f2e;
  --radius:14px;--radius2:10px;--font:'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
body{display:flex;flex-direction:column}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}

/* ── LOGIN ── */
#loginScreen{
  align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at 30% 40%,rgba(61,106,255,.15) 0%,transparent 60%),var(--bg);
}
.login-box{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px 28px}
.login-logo{text-align:center;margin-bottom:28px}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.login-logo h1{font-size:20px;font-weight:700}
.login-logo p{font-size:12px;color:var(--text2);margin-top:3px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.field input{width:100%;padding:13px 15px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:15px;outline:none;transition:border .2s}
.field input:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius2);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.login-err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;text-align:center}

/* ── MAIN APP ── */
#appScreen{background:var(--bg)}
.topbar{
  height:56px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0
}
.topbar-logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:700;flex:1}
.topbar-user{font-size:11px;color:var(--text2)}
.btn-logout{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:transparent;transition:all .2s;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:16px}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── SCANNER ── */
.scanner-wrap{position:relative;width:100%;max-width:500px;margin:0 auto}
#video{width:100%;border-radius:var(--radius);display:block;background:#000}
.scan-overlay{
  position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.scan-frame{
  width:65%;aspect-ratio:3/1;border:2px solid var(--accent);border-radius:8px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.45);position:relative
}
.scan-line{
  position:absolute;left:0;right:0;height:2px;background:var(--accent);
  animation:scanMove 2s ease-in-out infinite;top:0;opacity:.8
}
@keyframes scanMove{0%,100%{top:0}50%{top:calc(100% - 2px)}}
.scan-hint{text-align:center;font-size:13px;color:var(--text2);margin-top:12px}
.scan-btns{display:flex;gap:10px;margin-top:14px}
.btn{padding:12px 20px;border:none;border-radius:var(--radius2);font-size:14px;font-weight:600;cursor:pointer;flex:1;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--accent3);color:#000}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;flex:none}

/* ── MANUAL INPUT ── */
.manual-wrap{max-width:500px;margin:0 auto}
.manual-wrap .field input{font-size:16px;padding:14px 15px}
.search-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--radius2);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}

/* ── PRODUCTO CARD ── */
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:16px;max-width:500px;margin-left:auto;margin-right:auto;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.prod-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.prod-img{width:56px;height:56px;border-radius:10px;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-info{flex:1;min-width:0}
.prod-nombre{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:4px}
.prod-sku{font-size:12px;color:var(--text2);font-family:monospace}
.prod-estado{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:4px}
.estado-nuevo{background:rgba(0,200,160,.12);color:var(--accent3)}
.estado-usado{background:rgba(255,107,53,.12);color:var(--accent4)}
.estado-openbox{background:rgba(245,200,66,.12);color:var(--gold)}

.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.data-item{background:var(--bg3);border-radius:10px;padding:12px}
.data-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.data-value{font-size:16px;font-weight:800;letter-spacing:-.3px}
.val-green{color:var(--green)}
.val-blue{color:var(--accent)}
.val-gold{color:var(--gold)}
.val-teal{color:var(--accent3)}
.val-red{color:var(--red)}

/* ── STOCK EDITOR ── */
.stock-editor{background:var(--bg2);border:1px solid var(--accent);border-radius:var(--radius);padding:16px;margin-top:10px}
.stock-editor-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.stock-row{display:flex;align-items:center;gap:10px}
.qty-btn{width:44px;height:44px;border:1px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qty-btn:active{background:var(--bg4)}
.qty-input{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:20px;font-weight:700;text-align:center;outline:none;min-width:0}
.qty-input:focus{border-color:var(--accent)}
.save-stock-btn{padding:12px 20px;background:var(--accent3);border:none;border-radius:10px;color:#000;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0}

/* ── HISTORIAL ── */
.hist-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.hist-prod{font-size:13px;font-weight:600}
.hist-meta{font-size:11px;color:var(--text2);margin-top:3px}
.hist-diff{font-size:13px;font-weight:700;margin-top:4px}
.empty-state{text-align:center;padding:48px 16px;color:var(--text3)}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:14px}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;width:calc(100% - 32px);max-width:400px}
.toast-msg{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);margin-bottom:8px;animation:fadeIn .25s ease;text-align:center}
.toast-success{background:rgba(46,213,115,.15);border:1px solid rgba(46,213,115,.4);color:var(--green)}
.toast-error{background:rgba(255,71,87,.15);border:1px solid rgba(255,71,87,.4);color:var(--red)}
.toast-info{background:rgba(61,106,255,.15);border:1px solid rgba(61,106,255,.4);color:var(--accent)}
.toast-warn{background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.4);color:var(--gold)}

/* ── SPINNER ── */
.spinner{width:22px;height:22px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* html5-qrcode dark mode overrides */
#qr-reader{background:#000 !important;border:none !important}
#qr-reader__scan_region{background:#000 !important}
#qr-reader__scan_region img{display:none !important}
#qr-reader__dashboard{display:none !important}
#qr-reader video{border-radius:var(--radius);width:100% !important}

.scanning-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(61,106,255,.15);border:1px solid var(--accent);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--accent);margin-bottom:12px}
.scanning-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">📱</div>
      <h1>Focus Scanner</h1>
      <p>Control de Inventario · Focus Store</p>
    </div>
    <div class="login-err" id="loginErr">Usuario o contraseña incorrectos</div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="tu.usuario" autocomplete="username" autocapitalize="none">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Iniciar Sesión</button>
  </div>
</div>

<!-- APP -->
<div class="screen" id="appScreen">
  <div class="topbar">
    <div class="topbar-logo">📱</div>
    <div class="topbar-title">Focus Scanner</div>
    <div class="topbar-user" id="topbarUser"></div>
    <button class="btn-logout" onclick="doLogout()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('scanner')" id="tabScanner">📷 Escanear</button>
    <button class="tab" onclick="showTab('manual')" id="tabManual">🔍 Buscar</button>
    <button class="tab" onclick="showTab('historial')" id="tabHistorial">📋 Historial</button>
  </div>
  <div class="content">
    <!-- SCANNER TAB -->
    <div class="tab-pane active" id="paneScanner">
      <div class="scanner-wrap">
        <div id="scannerActive" style="display:none">
          <div class="scanning-badge"><span class="scanning-dot"></span> Escaneando...</div>
          <div id="qr-reader" style="width:100%;border-radius:var(--radius);overflow:hidden"></div>
          <p class="scan-hint">Apunta la cámara al código de barras del producto</p>
          <div class="scan-btns">
            <button class="btn btn-ghost" onclick="stopScanner()">✕ Cancelar</button>
          </div>
        </div>
        <div id="scannerIdle">
          <button class="btn btn-primary" style="width:100%;padding:16px;font-size:16px;margin-bottom:12px" onclick="startScanner()">
            📷 Activar Cámara y Escanear
          </button>
          <p style="text-align:center;font-size:12px;color:var(--text3)">O usa la pestaña "Buscar" para ingresar el SKU manualmente</p>
        </div>
        <div id="scanResult"></div>
      </div>
    </div>

    <!-- MANUAL TAB -->
    <div class="tab-pane" id="paneManual">
      <div class="manual-wrap">
        <div class="field">
          <label>SKU del Producto</label>
          <input type="text" id="manualSku" placeholder="Ej. 698813014507" autocapitalize="none"
            onkeydown="if(event.key==='Enter') buscarManual()">
        </div>
        <button class="search-btn" onclick="buscarManual()">🔍 Buscar Producto</button>
        <div id="manualResult"></div>
      </div>
    </div>

    <!-- HISTORIAL TAB -->
    <div class="tab-pane" id="paneHistorial">
      <div id="historialList">
        <div class="empty-state"><div class="icon">📋</div><p>Sin cambios en esta sesión</p></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://uzhjnedhmbvgfqqssuov.supabase.co';
const SUPABASE_KEY = 'sb_publishable_trBqjIA08Bl0pcle8deARw_ySykjCeo';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── ESTADO ──
let currentUser = null;
let parametros = {
  tipoCambio: 27, isvNuevo: 0.15, isvUsado: 0,
  bandas: [
    {banda:'Bajo',    excelente:.60, normal:.56, alto:.52, desde:0,      hasta:30},
    {banda:'Medio',   excelente:.46, normal:.42, alto:.38, desde:30.01,  hasta:400},
    {banda:'Alto',    excelente:.34, normal:.30, alto:.26, desde:400.01, hasta:1000},
    {banda:'Premium', excelente:.22, normal:.18, alto:.14, desde:1001,   hasta:999999}
  ],
  descMax: [
    {banda:'Bajo',excelente:.12,normal:.11,alto:.10},
    {banda:'Medio',excelente:.09,normal:.08,alto:.07},
    {banda:'Alto',excelente:.06,normal:.05,alto:.04},
    {banda:'Premium',excelente:.03,normal:.02,alto:.01}
  ]
};
let historialSesion = [];
let scannerCtrl = null;

// ── LOGIN ──
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (!u || !p) { mostrarErr(true); return; }
  const btn = document.getElementById('btnLogin');
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;
  try {
    // Cargar usuarios
    const { data: rows, error } = await sb.from('usuarios').select('*').eq('activo', true);
    if (!error && rows && rows.length > 0) {
      const found = rows.find(x => x.user === u && x.pass === p);
      if (!found) { mostrarErr(true); return; }
      // Solo admin, gerencia y ventas pueden usar el scanner
      if (!['admin','gerencia','ventas','bodega'].includes(found.rol)) {
        mostrarErr(true); return;
      }
      currentUser = found;
      // Cargar parámetros
      await cargarParametros();
      iniciarApp();
    } else {
      mostrarErr(true);
    }
  } catch(e) {
    mostrarErr(true);
  } finally {
    btn.innerHTML = 'Iniciar Sesión';
    btn.disabled = false;
  }
}

function mostrarErr(v) {
  document.getElementById('loginErr').style.display = v ? 'block' : 'none';
}

async function cargarParametros() {
  try {
    const { data, error } = await sb.rpc('get_all_data', { p_user: currentUser.user });
    if (!error && data) {
      const params = data.params || [];
      params.forEach(r => {
        try { parametros[r.clave] = JSON.parse(r.valor); } catch(e) {}
      });
    }
  } catch(e) {}
}

function iniciarApp() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('topbarUser').textContent = currentUser.nombre + ' · ' + currentUser.rol;
  document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
}

function doLogout() {
  if (scannerCtrl) stopScanner();
  currentUser = null;
  historialSesion = [];
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  mostrarErr(false);
}

// ── TABS ──
function showTab(name) {
  ['scanner','manual','historial'].forEach(t => {
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===name);
    document.getElementById('pane'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===name);
  });
  if (name !== 'scanner' && scannerCtrl) stopScanner();
  if (name === 'historial') renderHistorial();
}

// ── SCANNER ──
async function startScanner() {
  document.getElementById('scannerIdle').style.display = 'none';
  document.getElementById('scannerActive').style.display = 'block';
  document.getElementById('scanResult').innerHTML = '';

  try {
    const html5QrCode = new Html5Qrcode('qr-reader');
    scannerCtrl = html5QrCode;

    const config = {
      fps: 15,
      qrbox: { width: 280, height: 100 },
      aspectRatio: 1.7,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A
      ]
    };

    await html5QrCode.start(
      { facingMode: 'environment' },
      config,
      (decodedText) => {
        stopScanner();
        buscarProducto(decodedText.trim(), 'scanResult');
      },
      () => {} // ignore errors during scan
    );
  } catch(e) {
    stopScanner();
    console.error('Scanner error:', e);
    showToast('No se pudo acceder a la cámara. Asegúrate de dar permiso o usa búsqueda manual.', 'error');
  }
}

async function stopScanner() {
  if (scannerCtrl) {
    try {
      await scannerCtrl.stop();
      scannerCtrl.clear();
    } catch(e) {}
    scannerCtrl = null;
  }
  document.getElementById('scannerIdle').style.display = 'block';
  document.getElementById('scannerActive').style.display = 'none';
}

// ── BÚSQUEDA MANUAL ──
function buscarManual() {
  const sku = document.getElementById('manualSku').value.trim();
  if (!sku) { showToast('Ingresa un SKU', 'warn'); return; }
  buscarProducto(sku, 'manualResult');
}

// ── BUSCAR PRODUCTO ──
async function buscarProducto(sku, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = `<div class="prod-card" style="text-align:center;padding:24px"><div class="spinner"></div><p style="margin-top:10px;color:var(--text2);font-size:13px">Buscando ${sku}...</p></div>`;

  try {
    const { data, error } = await sb
      .from('productos')
      .select('*')
      .eq('sku', sku)
      .limit(1);

    if (error) throw new Error(error.message);
    if (!data || data.length === 0) {
      container.innerHTML = `<div class="prod-card" style="text-align:center;padding:24px">
        <div style="font-size:36px;margin-bottom:10px">🔍</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">Producto no encontrado</div>
        <div style="font-size:13px;color:var(--text2)">No existe ningún producto con SKU <strong>${sku}</strong></div>
      </div>`;
      return;
    }

    renderProductoCard(data[0], containerId);
  } catch(e) {
    container.innerHTML = `<div class="prod-card" style="text-align:center;padding:24px;color:var(--red)">❌ Error: ${e.message}</div>`;
  }
}

// ── CÁLCULOS (mismas fórmulas que el sistema principal) ──
function calcProd(p) {
  const tc = parametros.tipoCambio || 27;
  const costoExtraUSD = parseFloat(p.costo_extra)||0;
  const costoProvUSD  = parseFloat(p.costo_usd)||0;
  const fleteL        = parseFloat(p.flete_l)||0;
  const fleteUSD      = fleteL / tc;
  const costoTotalUSD = costoProvUSD + costoExtraUSD + fleteUSD;
  const costoTotalLPS = costoTotalUSD * tc;
  const isv = (p.estado==='Nuevo') ? (parametros.isvNuevo||0.15) : 0;

  let bandaAuto = 'Bajo';
  for(const b of (parametros.bandas||[])) {
    if(costoTotalUSD >= b.desde && costoTotalUSD <= b.hasta) { bandaAuto = b.banda; break; }
  }
  const bandaEfectiva = (p.override_banda||'').trim() || bandaAuto;
  const nivelKey = (p.nivel||'Normal').toLowerCase();
  const bandaRow = (parametros.bandas||[]).find(b=>b.banda===bandaEfectiva) || {normal:.40};
  const margenBase = bandaRow[nivelKey] || bandaRow.normal || 0.40;
  const ajusteManual = parseFloat(p.ajuste_manual)||0;
  const margenFinal = margenBase + ajusteManual;
  const precioNeto = costoTotalLPS * (1 + margenFinal);
  const precioConISV = (p.estado==='Nuevo') ? precioNeto * (1 + isv) : precioNeto;
  const descIngresadoPct = parseFloat(p.descuento||0) / 100;
  const precioFinalDesc = precioConISV * (1 - descIngresadoPct);

  return { costoTotalLPS, margenFinal, precioConISV, precioFinalDesc };
}

function fmtLPS(v) { return 'L ' + parseFloat(v||0).toLocaleString('es-HN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPct(v) { return (parseFloat(v||0)*100).toFixed(1)+'%'; }

// ── RENDER PRODUCTO ──
function renderProductoCard(p, containerId) {
  const c = calcProd(p);
  const esAdmin = ['admin','gerencia'].includes(currentUser?.rol);
  const puedeEditar = esAdmin || currentUser?.puede_editar_stock === true;
  const cantidad = parseInt(p.cantidad)||0;
  const cantColor = cantidad === 0 ? 'val-red' : cantidad <= (parseInt(p.min_stock)||0) ? 'val-gold' : 'val-green';

  // Campos según rol
  let dataHTML = `
    <div class="data-item">
      <div class="data-label">Cantidad en Stock</div>
      <div class="data-value ${cantColor}">${cantidad} uds.</div>
    </div>
    <div class="data-item">
      <div class="data-label">Precio Final c/Desc</div>
      <div class="data-value val-teal">${fmtLPS(c.precioFinalDesc)}</div>
    </div>
  `;

  if (esAdmin) {
    dataHTML += `
      <div class="data-item">
        <div class="data-label">Costo Total LPS</div>
        <div class="data-value val-gold">${fmtLPS(c.costoTotalLPS)}</div>
      </div>
      <div class="data-item">
        <div class="data-label">Margen Final %</div>
        <div class="data-value val-blue">${fmtPct(c.margenFinal)}</div>
      </div>
      <div class="data-item" style="grid-column:1/-1">
        <div class="data-label">Precio c/ISV (Col X)</div>
        <div class="data-value val-green">${fmtLPS(c.precioConISV)}</div>
      </div>
    `;
  }

  const imgHTML = p.imagen
    ? `<div class="prod-img"><img src="${p.imagen}" alt=""></div>`
    : `<div class="prod-img">📦</div>`;

  const estadoClass = {Nuevo:'estado-nuevo',Usado:'estado-usado','Open Box':'estado-openbox'}[p.estado]||'estado-nuevo';

  const editorHTML = puedeEditar ? `
    <div class="stock-editor">
      <div class="stock-editor-title">✏️ Actualizar Stock</div>
      <div class="stock-row">
        <button class="qty-btn" onclick="ajustarQty('${p.id}', -1)">−</button>
        <input type="number" class="qty-input" id="qty_${p.id}" value="${cantidad}" min="0">
        <button class="qty-btn" onclick="ajustarQty('${p.id}', 1)">+</button>
        <button class="save-stock-btn" onclick="guardarStock('${p.id}', '${p.sku}', '${p.producto.replace(/'/g,"\\'")}')">💾 Guardar</button>
      </div>
    </div>` : '';

  document.getElementById(containerId).innerHTML = `
    <div class="prod-card">
      <div class="prod-header">
        ${imgHTML}
        <div class="prod-info">
          <div class="prod-nombre">${p.producto}</div>
          <div class="prod-sku">SKU: ${p.sku}</div>
          <span class="prod-estado ${estadoClass}">${p.estado}</span>
        </div>
      </div>
      <div class="data-grid">${dataHTML}</div>
      ${editorHTML}
    </div>`;
}

// ── AJUSTAR CANTIDAD ──
function ajustarQty(id, delta) {
  const input = document.getElementById('qty_'+id);
  if (!input) return;
  const val = Math.max(0, (parseInt(input.value)||0) + delta);
  input.value = val;
}

// ── GUARDAR STOCK ──
async function guardarStock(id, sku, nombre) {
  const input = document.getElementById('qty_'+id);
  if (!input) return;
  const nuevaCantidad = parseInt(input.value);
  if (isNaN(nuevaCantidad) || nuevaCantidad < 0) { showToast('Cantidad inválida','error'); return; }

  const btn = document.querySelector(`[onclick="guardarStock('${id}','${sku}','${nombre.replace(/'/g,"\\'")}')"]`);
  if (btn) { btn.textContent = '...'; btn.disabled = true; }

  try {
    // Primero obtener cantidad anterior
    const { data: prev } = await sb.from('productos').select('cantidad').eq('id', id).single();
    const cantidadAnterior = prev?.cantidad ?? '?';

    const { error } = await sb.rpc('update_stock', {
      p_user:     currentUser.user,
      p_prod_id:  id,
      p_cantidad: nuevaCantidad
    });
    if (error) throw new Error(error.message);

    // Registrar en historial de sesión
    historialSesion.unshift({
      nombre, sku,
      de: cantidadAnterior,
      a: nuevaCantidad,
      usuario: currentUser.nombre,
      hora: new Date().toLocaleTimeString('es-HN', {hour:'2-digit',minute:'2-digit'})
    });

    showToast(`✅ Stock actualizado: ${cantidadAnterior} → ${nuevaCantidad}`, 'success');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    if (btn) { btn.textContent = '💾 Guardar'; btn.disabled = false; }
  }
}

// ── HISTORIAL ──
function renderHistorial() {
  const el = document.getElementById('historialList');
  if (!historialSesion.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>Sin cambios en esta sesión</p></div>`;
    return;
  }
  el.innerHTML = historialSesion.map(h => {
    const diff = h.a - h.de;
    const diffColor = diff > 0 ? 'val-green' : diff < 0 ? 'val-red' : 'val-gold';
    const diffLabel = diff > 0 ? `+${diff}` : `${diff}`;
    return `<div class="hist-item">
      <div class="hist-prod">${h.nombre}</div>
      <div class="hist-meta">SKU: ${h.sku} · ${h.usuario} · ${h.hora}</div>
      <div class="hist-diff ${diffColor}">${h.de} → ${h.a} (${diffLabel})</div>
    </div>`;
  }).join('');
}

// ── TOAST ──
function showToast(msg, tipo='info') {
  const el = document.getElementById('toast');
  const d = document.createElement('div');
  d.className = `toast-msg toast-${tipo}`;
  d.textContent = msg;
  el.appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

// ── ENTER EN LOGIN ──
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginUser').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});
</script>
